<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6B2FD9">
<title>Mushu: Sonrisas en Acción 🌈🦷</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0840;font-family:'Baloo 2',cursive;}
#app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,#2d0f6b 0%,#1a0840 60%,#0d0420 100%);}
#wrap{position:relative;display:flex;flex-direction:column;}
canvas{display:block;border-radius:20px;box-shadow:0 0 60px rgba(150,80,255,0.4),0 0 120px rgba(100,200,255,0.15);}
/* HUD overlayed via canvas – no extra HTML for performance */
/* Touch buttons */
#btns{display:flex;gap:12px;padding:10px 16px;justify-content:space-between;align-items:center;}
.tbtn{border:none;border-radius:999px;cursor:pointer;font-family:'Baloo 2',cursive;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .1s,filter .1s;
  box-shadow:0 6px 20px rgba(0,0,0,0.4),inset 0 2px 0 rgba(255,255,255,0.3);}
.tbtn:active{transform:scale(0.91)!important;filter:brightness(0.85);}
#btnJump{background:linear-gradient(160deg,#ff9de8,#d93fff);color:#fff;font-size:20px;padding:14px 34px;flex:1;max-width:240px;}
#btnDuck{background:linear-gradient(160deg,#4dd4ff,#1a8fff);color:#fff;font-size:20px;padding:14px 34px;flex:1;max-width:240px;}
#btnPow{background:linear-gradient(160deg,#ffe048,#ff9900);color:#fff;font-size:20px;padding:14px 34px;flex:1;max-width:240px;}
/* Overlay screens */
#screen{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(15,5,40,0.92);backdrop-filter:blur(4px);z-index:20;transition:opacity .3s;}
#screen.hidden{display:none;}
.stitle{font-family:'Baloo 2',cursive;font-size:clamp(28px,5vw,56px);color:#ffd700;
  text-shadow:0 0 24px #ff6bff,0 4px 0 #8b00c8;margin-bottom:4px;text-align:center;line-height:1.1;}
.ssub{font-family:'Nunito',sans-serif;color:#d0b8ff;font-size:clamp(12px,2vw,18px);margin-bottom:22px;text-align:center;max-width:540px;line-height:1.5;}
.sbtn{border:none;border-radius:999px;font-family:'Baloo 2',cursive;font-weight:800;
  font-size:clamp(16px,2.5vw,26px);padding:16px 48px;cursor:pointer;
  background:linear-gradient(135deg,#ff6bff,#7b2fff);color:#fff;
  box-shadow:0 8px 30px rgba(255,107,255,0.55),inset 0 2px 0 rgba(255,255,255,0.25);
  transition:transform .12s,box-shadow .12s;}
.sbtn:hover{transform:scale(1.07);box-shadow:0 12px 40px rgba(255,107,255,0.7);}
.sbtn:active{transform:scale(0.95);}
.sbtn.green{background:linear-gradient(135deg,#4fffb0,#00c870);box-shadow:0 8px 30px rgba(0,220,120,0.5);}
.hint{color:#9988cc;font-size:clamp(10px,1.5vw,14px);margin-top:16px;text-align:center;line-height:1.9;}
.hint b{color:#ff9de8;}
#bestRow{color:#ffd700;font-family:'Nunito',sans-serif;font-size:clamp(13px,2vw,20px);font-weight:900;margin-top:12px;}
</style>
</head>
<body>
<div id="app">
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="btns">
    <button class="tbtn" id="btnJump">👆 Saltar</button>
    <button class="tbtn" id="btnPow">⭐ Poder</button>
    <button class="tbtn" id="btnDuck">👇 Agachar</button>
  </div>
</div>

<div id="screen">
  <div class="stitle" id="sTitle">🌈 Mushu<br>Sonrisas en Acción</div>
  <div class="ssub" id="sSub">¡Mushu necesita tu ayuda! El Rey Sarro está ensuciando el Reino de las Sonrisas.<br>¡Corre, limpia y devuelve la alegría a todos los dientes! 🦷✨</div>
  <button class="sbtn green" id="sBtn">¡JUGAR AHORA! 🐱</button>
  <div id="bestRow"></div>
  <div class="hint" id="sHint">
    <b>👆 Toca</b> para saltar &nbsp;·&nbsp; <b>👆👆</b> doble toque = salto doble<br>
    <b>👇 Desliza</b> hacia abajo para agacharte &nbsp;·&nbsp; <b>⭐</b> activa tu poder especial
  </div>
</div>
</div>

<script>
(()=>{
/* ═══════════════════════════════════════════════
   SETUP
══════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const screen = document.getElementById('screen');
const btns = document.getElementById('btns');

// Logical game dimensions (landscape)
const GW = 960, GH = 480;
let scale = 1;

function resize(){
  const pw = window.innerWidth, ph = window.innerHeight;
  // reserve space for buttons bar (~80px at scale 1)
  const btnH = 80;
  const availH = ph - btnH - 10;
  scale = Math.min(pw / GW, availH / GH);
  scale = Math.max(0.35, Math.min(scale, 2));
  canvas.width  = Math.round(GW * scale);
  canvas.height = Math.round(GH * scale);
  canvas.style.width  = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  wrap.style.width = canvas.width + 'px';
  // button sizes
  const bSize = Math.max(44, Math.round(54 * scale));
  document.querySelectorAll('.tbtn').forEach(b=>{
    b.style.fontSize = Math.max(14, Math.round(20*scale))+'px';
    b.style.padding  = Math.max(10,Math.round(14*scale))+'px '+Math.max(18,Math.round(34*scale))+'px';
  });
}
resize();
window.addEventListener('resize', resize);

/* ═══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const GRAVITY   = 0.58;
const JUMP1     = -13.5;
const JUMP2     = -11.0;
const FLOOR     = GH - 90;   // player feet Y
const CEIL      = 40;

/* ═══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let gstate = 'menu'; // menu | playing | gameover
let score=0, best=0, lives=3, frame=0, dist=0;
let spd=3.8, lvl=1, nextLvl=1200, comboMult=1, comboT=0;
let invT=0, shieldOn=false;
let pwActive=null, pwTimer=0, pwQueued=false;
let spawnT=0, spawnInt=85, puSpawnT=0;
let bgX=0, bgX2=0, bgX3=0;
let particles=[], floats=[], sparkles=[];
let obstacles=[], powerups=[];
let levelFlash=0, levelFlashTxt='';
let lastTap=0;
let swipeY0=0, swipeDone=false;
let skinIdx=0;
const SKINS=[
  {coat:'#1a1a5a',body:'#f5e0d0',accent:'#5bc8ff',name:'Odontólogo'},
  {coat:'#2a1a0a',body:'#e0c8b0',accent:'#ff4444',name:'Ninja'},
  {coat:'#0a3a6a',body:'#c8e0f8',accent:'#00ffcc',name:'Futurista'},
];

const player = {
  x:130, y:FLOOR, w:52, h:64,
  vy:0, onGround:true, jumps:0, maxJumps:2,
  ducking:false, dead:false, runF:0, runT:0
};

/* ═══════════════════════════════════════════════
   WORLD / LEVEL THEMES
══════════════════════════════════════════════ */
const WORLDS = [
  {name:'Valle del Cepillado',   sky:['#a8eaff','#d4f0ff'], gum:'#ffb8d8', tooth:'#fffcf0', floor:'#f0e8d0', stars:false},
  {name:'Montaña del Hilo Dental',sky:['#ffd4a0','#ffe8c0'], gum:'#e89870', tooth:'#f5e8d0', floor:'#d8c090', stars:false},
  {name:'Caverna de las Caries',  sky:['#c0a8e0','#e0d0f8'], gum:'#9a6aaa', tooth:'#d8c8e8', floor:'#9878a0', stars:false},
  {name:'Reino Nocturno',         sky:['#050520','#0a0a30'], gum:'#0d0d3a', tooth:'#151540', floor:'#080825', stars:true},
];
function world(){ return WORLDS[Math.min(lvl-1,3)]; }

/* ═══════════════════════════════════════════════
   OBSTACLES
══════════════════════════════════════════════ */
const OBS = [
  { id:'caries', w:38,h:42,
    draw(o){
      const t=frame*0.09;
      // body
      ctx.fillStyle='#7a3a18';
      ctx.beginPath(); ctx.ellipse(o.x+19,o.y+20,18,18,0,0,Math.PI*2); ctx.fill();
      // spots
      ctx.fillStyle='#4a2008';
      ctx.beginPath(); ctx.ellipse(o.x+12,o.y+26,7,7,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(o.x+25,o.y+29,6,6,0,0,Math.PI*2); ctx.fill();
      // glow pulse
      ctx.strokeStyle=`rgba(255,100,100,${0.3+Math.sin(t)*0.2})`;
      ctx.lineWidth=3;
      ctx.beginPath(); ctx.ellipse(o.x+19,o.y+20,21+Math.sin(t)*2,21+Math.sin(t)*2,0,0,Math.PI*2); ctx.stroke();
      // eyes
      ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.ellipse(o.x+13,o.y+15,4,4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.ellipse(o.x+25,o.y+15,4,4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#333';   ctx.beginPath(); ctx.ellipse(o.x+13,o.y+15,2,2,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#333';   ctx.beginPath(); ctx.ellipse(o.x+25,o.y+15,2,2,0,0,Math.PI*2); ctx.fill();
    }
  },
  { id:'muela', w:68,h:72,
    draw(o){
      ctx.fillStyle='#efe0c0';
      rrect(ctx,o.x,o.y,68,62,12); ctx.fill();
      ctx.strokeStyle='#d0b888'; ctx.lineWidth=2.5; ctx.stroke();
      // bumps
      ctx.fillStyle='#d8c898';
      [6,50].forEach(bx=>{ [6,46].forEach(by=>{ ctx.beginPath(); ctx.ellipse(o.x+bx+6,o.y+by+6,7,7,0,0,Math.PI*2); ctx.fill(); }); });
      // damage crack
      ctx.strokeStyle='rgba(150,90,40,0.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(o.x+28,o.y+8); ctx.lineTo(o.x+38,o.y+25); ctx.lineTo(o.x+30,o.y+42); ctx.stroke();
      // label
      ctx.fillStyle='#a07040'; ctx.font=`bold ${9*scale}px Nunito`; ctx.textAlign='center';
      ctx.fillText('MUELA',o.x+34,o.y+76); ctx.textAlign='left';
    }
  },
  { id:'sarro', w:100,h:20, floor:true,
    draw(o){
      ctx.fillStyle='rgba(200,188,110,0.85)';
      rrect(ctx,o.x,o.y,100,20,4); ctx.fill();
      ctx.fillStyle='rgba(165,150,80,0.6)';
      for(let i=0;i<7;i++) ctx.fillRect(o.x+i*14+1,o.y+3,12,14);
      ctx.fillStyle='#a08840'; ctx.font=`bold 9px Nunito`; ctx.textAlign='center';
      ctx.fillText('⚡ SARRO',o.x+50,o.y+15); ctx.textAlign='left';
    }
  },
  { id:'bacteria', w:40,h:40, mobile:true,
    draw(o){
      const t=frame*0.07;
      const bx=o.x+20,by=o.y+20;
      ctx.fillStyle='#38b030';
      ctx.beginPath(); ctx.ellipse(bx,by,18,18,0,0,Math.PI*2); ctx.fill();
      // flagella
      ctx.fillStyle='#28a020';
      for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2+t;
        ctx.beginPath(); ctx.ellipse(bx+Math.cos(a)*18,by+Math.sin(a)*18,6,6,0,0,Math.PI*2); ctx.fill();
      }
      // face
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(bx-5,by-4,5,5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx+5,by-4,5,5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#222';
      ctx.beginPath(); ctx.ellipse(bx-5,by-4,2.5,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx+5,by-4,2.5,2.5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff5050';
      ctx.beginPath(); ctx.arc(bx,by+5,5.5,0.1,Math.PI-0.1); ctx.fill();
    }
  },
  { id:'dulce', w:34,h:34,
    draw(o){
      const icons=['🍬','🍭','🍫','🍩','🍪'];
      ctx.font='26px serif'; ctx.textAlign='center';
      ctx.fillText(icons[o._v||0],o.x+17,o.y+28); ctx.textAlign='left';
    }
  }
];

/* ═══════════════════════════════════════════════
   POWER-UPS
══════════════════════════════════════════════ */
const PWS = [
  {id:'cepillo', icon:'🪥', color:'#5bc8ff',  label:'¡Cepillo Mágico!',  dur:320},
  {id:'pasta',   icon:'✨', color:'#fffb60',  label:'¡Pasta Brillante!',  dur:280},
  {id:'floss',   icon:'🧵', color:'#e0d0ff',  label:'¡Hilo Láser!',       dur:200},
  {id:'rinse',   icon:'💧', color:'#70e8c0',  label:'¡Enjuague Burbujeante!',dur:260},
  {id:'smile',   icon:'🌈', color:'#ff9de8',  label:'¡Sonrisa Power!',    dur:240},
];

/* ═══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

function burst(x,y,col,n,big){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=big?(2+Math.random()*5):(1.5+Math.random()*3.5);
    const v=big?(3+Math.random()*5):(2+Math.random()*4);
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,alpha:1,col,r:s,grav:0.12});
  }
}

function sparkle(x,y){
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2;
    sparkles.push({x,y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,alpha:1,life:40,r:3+Math.random()*3});
  }
}

function floatText(txt,x,y,col){
  floats.push({txt,x,y:y-10,col,alpha:1,vy:-1.4,life:70});
}

function vibrate(ms){ try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){} }

function aabb(a,b,sh=6){
  return a.x+sh<b.x+b.w && a.x+a.w-sh>b.x && a.y+sh<b.y+b.h && a.y+a.h-sh>b.y;
}

/* ═══════════════════════════════════════════════
   GAME LOGIC
══════════════════════════════════════════════ */
function resetGame(){
  score=0;lives=3;frame=0;dist=0;lvl=1;nextLvl=1200;
  spd=3.8;spawnT=0;spawnInt=85;puSpawnT=0;
  comboMult=1;comboT=0;invT=0;shieldOn=false;
  pwActive=null;pwTimer=0;pwQueued=false;
  obstacles=[];powerups=[];particles=[];floats=[];sparkles=[];
  bgX=bgX2=bgX3=0;levelFlash=0;
  player.y=FLOOR;player.vy=0;player.onGround=true;
  player.ducking=false;player.dead=false;player.jumps=0;
}

function doJump(){
  if(player.dead||gstate!=='playing') return;
  if(player.jumps<player.maxJumps){
    player.vy = player.jumps===0 ? JUMP1 : JUMP2;
    player.onGround=false; player.jumps++;
    burst(player.x+player.w/2,player.y+player.h,'#ffe8ff',7);
    vibrate(15);
  }
}

function doDuck(on){
  if(player.dead) return;
  player.ducking=on;
  player.h = on ? 34 : 64;
  if(!on) player.y = FLOOR;
}

function usePower(){
  if(gstate!=='playing') return;
  if(pwActive){
    floatText('⚡ PODER ACTIVO!',player.x,player.y-30,'#ffd700');
    burst(player.x+player.w/2,player.y,'#ffd700',14,true);
    vibrate([20,10,40]);
  } else {
    floatText('Recoge un poder primero!',player.x,player.y-30,'#aaa');
  }
}

function hitPlayer(ob){
  if(invT>0) return;
  if(shieldOn){ shieldOn=false; burst(player.x+26,player.y,'#ffd700',18,true); vibrate([30,20,30]); return; }
  if(pwActive==='rinse'||pwActive==='smile') return;
  if(pwActive==='floss'&&ob.id!=='muela') return;
  if((pwActive==='cepillo'||pwActive==='pasta')&&ob.id==='caries'){
    score+=60*comboMult; burst(ob.x+ob.w/2,ob.y,'#5bc8ff',14,true);
    sparkle(ob.x+ob.w/2,ob.y+ob.h/2);
    floatText('+60 ✨',ob.x,ob.y-20,'#5bc8ff'); return;
  }
  lives--; invT=100; comboMult=1; comboT=0;
  burst(player.x+26,player.y+32,'#ff6666',20,true); vibrate(200);
  if(lives<=0) setTimeout(gameOver,350);
}

function gameOver(){
  gstate='gameover'; player.dead=true;
  if(score>best) best=score;
  vibrate([80,40,160]);
  setTimeout(()=>showScreen('over'),600);
}

function spawnOb(){
  const pool=[0,0,0,1,2,3,4];
  const t=OBS[pool[Math.floor(Math.random()*pool.length)]];
  const o={...t, x:GW+30};
  if(o.id==='sarro'){ o.y=FLOOR+64-20; }
  else if(o.id==='bacteria'){
    o.y=FLOOR-o.h-(Math.random()>0.4?60:0);
    o.baseY=o.y; o.amp=25; o.freq=0.04+Math.random()*0.025;
  } else { o.y=FLOOR+64-o.h; }
  if(o.id==='dulce') o._v=Math.floor(Math.random()*5);
  obstacles.push(o);
}

function spawnPU(){
  const t=PWS[Math.floor(Math.random()*PWS.length)];
  powerups.push({...t, x:GW+20, y:FLOOR-85-Math.random()*50, w:44,h:44, bob:Math.random()*6.28});
}

/* ═══════════════════════════════════════════════
   UPDATE
══════════════════════════════════════════════ */
function update(){
  if(gstate!=='playing') return;
  frame++; dist+=spd; score+=spd*0.07*comboMult; spd+=0.0007;
  bgX-=spd*0.4; bgX2-=spd*0.7; bgX3-=spd;
  if(comboT>0) comboT--; else comboMult=Math.max(1,comboMult);
  if(invT>0) invT--;
  if(pwActive&&pwActive!=='smile_perm'){ pwTimer--; if(pwTimer<=0){ pwActive=null; } }

  // level up
  if(dist>nextLvl&&lvl<4){
    lvl++; nextLvl+=lvl*1800; spd=Math.min(10,spd+0.8);
    spawnInt=Math.max(50,spawnInt-8);
    levelFlash=150; levelFlashTxt=`🌈 Nivel ${lvl}: ${WORLDS[lvl-1].name}`;
    burst(GW/2,GH/2,'#ffd700',35,true); vibrate([40,20,40,20,80]);
    for(let i=0;i<12;i++) sparkle(Math.random()*GW, Math.random()*GH*0.7);
  }

  // player physics
  player.vy+=GRAVITY;
  player.y+=player.vy;
  const floorY=FLOOR+(player.ducking?30:0);
  if(player.y>=floorY){ player.y=floorY; player.vy=0; player.onGround=true; player.jumps=0; }
  player.runT++; if(player.runT%6===0) player.runF=(player.runF+1)%4;

  // spawn
  spawnT++; if(spawnT>=spawnInt){ spawnT=0; spawnInt=Math.max(50,85-lvl*7); spawnOb(); }
  puSpawnT++; if(puSpawnT>=280){ puSpawnT=0; if(Math.random()<0.7) spawnPU(); }

  // obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i]; o.x-=spd;
    if(o.id==='bacteria') o.y=o.baseY+Math.sin(frame*o.freq)*o.amp;
    if(aabb(player,o)){ hitPlayer(o); obstacles.splice(i,1); continue; }
    if(o.x+o.w<-40) obstacles.splice(i,1);
  }

  // powerups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i]; p.x-=spd;
    p.y+=Math.sin(frame*0.07+p.bob)*0.7;
    if(aabb(player,p)){
      pwActive=p.id; pwTimer=p.dur;
      if(p.id==='shield') shieldOn=true;
      comboMult=Math.min(10,comboMult+1); comboT=220;
      burst(p.x+22,p.y+22,p.color,18,true);
      for(let k=0;k<6;k++) sparkle(p.x+22,p.y+22);
      floatText(p.label,p.x,p.y-28,p.color);
      vibrate([15,8,35]); powerups.splice(i,1); continue;
    }
    if(p.x<-60) powerups.splice(i,1);
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.grav||0.15; p.alpha-=0.03;
    if(p.alpha<=0) particles.splice(i,1);
  }
  for(let i=sparkles.length-1;i>=0;i--){
    const s=sparkles[i];
    s.x+=s.vx; s.y+=s.vy; s.alpha-=0.025; s.life--;
    if(s.life<=0) sparkles.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];
    f.y+=f.vy; f.alpha-=0.015; f.life--;
    if(f.life<=0) floats.splice(i,1);
  }
  if(levelFlash>0) levelFlash--;
}

/* ═══════════════════════════════════════════════
   DRAW BACKGROUND
══════════════════════════════════════════════ */
function drawBg(){
  const w=world();
  // sky gradient
  const grd=ctx.createLinearGradient(0,0,0,GH);
  grd.addColorStop(0,w.sky[0]); grd.addColorStop(1,w.sky[1]);
  ctx.fillStyle=grd; ctx.fillRect(0,0,GW,GH);

  // stars (night)
  if(w.stars){
    ctx.fillStyle='rgba(255,255,255,0.85)';
    for(let i=0;i<40;i++){
      const sx=((i*53+bgX*0.1+700)%GW), sy=(i*29+17)%(GH-120);
      const sz=0.5+Math.sin(frame*0.03+i)*0.5;
      ctx.beginPath(); ctx.arc(sx,sy,sz+0.5,0,Math.PI*2); ctx.fill();
    }
  }

  // back clouds / shapes
  ctx.globalAlpha=0.18;
  ctx.fillStyle=w.gum;
  for(let i=0;i<5;i++){
    const cx=((i*220+bgX2*0.5+2000)%GW)-40;
    ctx.beginPath(); ctx.ellipse(cx,GH-160,80,45,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // gum band
  ctx.fillStyle=w.gum;
  ctx.fillRect(0,FLOOR+64,GW,GH-FLOOR-64);

  // gum arcs
  ctx.fillStyle=lvl===4?'#0e0e30':w.gum;
  for(let i=0;i<9;i++){
    const bx=((i*120+bgX3*0.35)%GW)-20;
    ctx.beginPath(); ctx.arc(bx+60,FLOOR+64,52,Math.PI,0); ctx.fill();
  }

  // teeth silhouettes
  ctx.fillStyle=lvl===4?'#111128':w.tooth;
  for(let i=0;i<7;i++){
    const tx=((i*150-bgX3*0.55+1200)%GW)-20;
    ctx.beginPath();
    ctx.moveTo(tx,FLOOR+64);
    ctx.lineTo(tx+16,FLOOR+30);
    ctx.lineTo(tx+32,FLOOR+44);
    ctx.lineTo(tx+48,FLOOR+30);
    ctx.lineTo(tx+64,FLOOR+64);
    ctx.fill();
    ctx.strokeStyle=lvl===4?'#1c1c40':'rgba(200,200,200,0.4)';
    ctx.lineWidth=0.8; ctx.stroke();
  }

  // night overlay + spotlight
  if(lvl===4){
    ctx.fillStyle='rgba(0,0,18,0.45)'; ctx.fillRect(0,0,GW,GH);
    const spot=ctx.createRadialGradient(player.x+26,player.y+32,0,player.x+26,player.y+32,130);
    spot.addColorStop(0,'rgba(255,255,180,0.22)'); spot.addColorStop(1,'transparent');
    ctx.fillStyle=spot; ctx.fillRect(0,0,GW,GH);
  }

  // Smile power rainbow overlay
  if(pwActive==='smile'){
    ctx.globalAlpha=0.12+Math.sin(frame*0.1)*0.06;
    const rbow=ctx.createLinearGradient(0,0,GW,0);
    ['#ff0000','#ff8c00','#ffe000','#00cc44','#00aaff','#8844ff'].forEach((c,i,a)=>rbow.addColorStop(i/(a.length-1),c));
    ctx.fillStyle=rbow; ctx.fillRect(0,0,GW,GH);
    ctx.globalAlpha=1;
  }
}

/* ═══════════════════════════════════════════════
   DRAW MUSHU (Cat)
══════════════════════════════════════════════ */
function drawMushu(){
  if(player.dead) return;
  const px=player.x, py=player.y, pw=player.w, ph=player.h;
  const sk=SKINS[skinIdx];
  ctx.save();
  if(invT>0&&Math.floor(invT/6)%2===0) ctx.globalAlpha=0.3;

  // Legs (run animation)
  if(!player.ducking){
    const lp=Math.sin(frame*0.35)*7;
    ctx.fillStyle=sk.body;
    rrect(ctx,px+8,py+ph-4,13,18,5); ctx.fill();
    rrect(ctx,px+pw-21,py+ph-4,13,18,5); ctx.fill();
    ctx.fillStyle='#c0a090';
    ctx.fillRect(px+10,py+ph+13,11,5+lp);
    ctx.fillRect(px+pw-19,py+ph+13,11,5-lp);
  }

  // Body
  ctx.fillStyle=sk.body;
  rrect(ctx,px,py+(player.ducking?12:0),pw,player.ducking?22:ph-10,12);
  ctx.fill();

  // Coat / lab coat
  ctx.fillStyle=sk.coat;
  rrect(ctx,px+2,py+(player.ducking?12:0),pw-4,player.ducking?16:32,10);
  ctx.fill();

  // Name on coat
  ctx.fillStyle=sk.accent; ctx.font='bold 9px Nunito'; ctx.textAlign='center';
  ctx.fillText('Dr.',px+pw/2,py+(player.ducking?21:16));
  if(!player.ducking) ctx.fillText('Mushu',px+pw/2,py+28);
  ctx.textAlign='left';

  // Head (only when not ducking)
  if(!player.ducking){
    const hx=px+pw/2, hy=py-20;
    // head
    ctx.fillStyle=sk.body;
    ctx.beginPath(); ctx.arc(hx,hy,22,0,Math.PI*2); ctx.fill();
    // ears
    ctx.fillStyle=sk.body;
    [[hx-22,hy-12],[hx+22,hy-12]].forEach(([ex,ey])=>{
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex<hx?ex-9:ex+9,ey-18); ctx.lineTo(hx<ex?ex-10:ex+10,ey-6); ctx.closePath(); ctx.fill();
    });
    ctx.fillStyle='#ffb8b0';
    [[hx-22,hy-12],[hx+22,hy-12]].forEach(([ex,ey])=>{
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex<hx?ex-5:ex+5,ey-12); ctx.lineTo(hx<ex?ex-6:ex+6,ey-5); ctx.closePath(); ctx.fill();
    });
    // glasses
    ctx.strokeStyle='#555'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(hx-7,hy-2,7,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(hx+7,hy-2,7,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx-14,hy-2); ctx.lineTo(hx,hy-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx+14,hy-2); ctx.lineTo(hx+22,hy-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx-14,hy-2); ctx.lineTo(hx-22,hy-1); ctx.stroke();
    // eyes behind glasses
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.arc(hx-7,hy-2,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+7,hy-2,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(hx-5.5,hy-3,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+8.5,hy-3,1.5,0,Math.PI*2); ctx.fill();
    // whiskers
    ctx.strokeStyle='#c0a898'; ctx.lineWidth=1;
    [[-6,-16],[6,16]].forEach(([dx,tx])=>{
      ctx.beginPath(); ctx.moveTo(hx+dx/6,hy+5); ctx.lineTo(hx+tx,hy+3); ctx.stroke();
    });
    // smile
    ctx.fillStyle='#ff9090';
    ctx.beginPath(); ctx.arc(hx,hy+8,5,0.15,Math.PI-0.15); ctx.fill();
    // doctor hat
    ctx.fillStyle=sk.coat;
    rrect(ctx,hx-12,hy-42,24,16,4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.lineWidth=1.5; ctx.strokeStyle='#ddd';
    rrect(ctx,hx-15,hy-26,30,6,3); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.arc(hx,hy-44,4,0,Math.PI*2); ctx.fill();
  }

  // Shield aura
  if(shieldOn){
    const aura=ctx.createRadialGradient(px+pw/2,py+ph/2,20,px+pw/2,py+ph/2,42);
    aura.addColorStop(0,'rgba(255,215,0,0.35)'); aura.addColorStop(1,'rgba(255,215,0,0)');
    ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(px+pw/2,py+ph/2,42,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,0.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(px+pw/2,py+ph/2,38+Math.sin(frame*0.15)*2,0,Math.PI*2); ctx.stroke();
  }

  // Power glow trail
  if(pwActive&&pwActive!=='shield'){
    const pc={cepillo:'#5bc8ff',pasta:'#fffb60',floss:'#e0d0ff',rinse:'#70e8c0',smile:'#ff9de8'}[pwActive]||'#fff';
    ctx.globalAlpha=0.18+Math.sin(frame*0.12)*0.08;
    ctx.fillStyle=pc;
    ctx.beginPath(); ctx.arc(px+pw/2,py+ph/2,36,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=ctx.save?1:1;
    ctx.globalAlpha=1;
  }

  ctx.restore();
}

/* ═══════════════════════════════════════════════
   DRAW HUD
══════════════════════════════════════════════ */
function drawHUD(){
  // top bar bg
  ctx.fillStyle='rgba(10,5,30,0.55)';
  rrect(ctx,10,10,GW-20,52,14); ctx.fill();

  // Score
  ctx.fillStyle='#ffd700'; ctx.font='bold 20px Baloo\\ 2,sans-serif'; ctx.textAlign='left';
  ctx.fillText(`⭐ ${Math.floor(score)}`,22,40);
  // World
  ctx.fillStyle='#e0d0ff'; ctx.font='bold 15px Nunito'; ctx.textAlign='center';
  ctx.fillText(`🌍 ${WORLDS[Math.min(lvl-1,3)].name}`,GW/2,38);
  // Lives
  ctx.fillStyle='#ff88aa'; ctx.font='bold 18px Nunito'; ctx.textAlign='right';
  ctx.fillText(Array(lives).fill('❤️').join('')||'💀',GW-18,40);
  // Combo
  if(comboMult>1){
    ctx.fillStyle='#ffe048'; ctx.font='bold 13px Nunito'; ctx.textAlign='left';
    ctx.fillText(`🔥 x${comboMult}`,22,56);
  }
  ctx.textAlign='left';

  // Active power bar
  if(pwActive&&pwActive!=='shield'){
    const pi=PWS.find(p=>p.id===pwActive);
    const ratio=pwTimer/(pi?.dur||200);
    const bx=GW/2-90, by=68, bw=180, bh=12;
    ctx.fillStyle='rgba(0,0,0,0.35)'; rrect(ctx,bx,by,bw,bh,5); ctx.fill();
    const barGrd=ctx.createLinearGradient(bx,0,bx+bw,0);
    barGrd.addColorStop(0,pi?.color||'#fff'); barGrd.addColorStop(1,'#fff');
    ctx.fillStyle=barGrd; rrect(ctx,bx,by,bw*ratio,bh,5); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='10px Nunito'; ctx.textAlign='center';
    ctx.fillText((pi?.icon||'')+'  '+pwActive.toUpperCase(),GW/2,by+9); ctx.textAlign='left';
  }

  // Level flash
  if(levelFlash>20){
    const a=Math.min(1,(levelFlash-20)/25);
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(10,5,30,0.7)';
    rrect(ctx,GW/2-170,GH/2-34,340,68,18); ctx.fill();
    ctx.fillStyle='#ffd700'; ctx.font='bold 28px Baloo\\ 2,sans-serif'; ctx.textAlign='center';
    ctx.fillText(levelFlashTxt,GW/2,GH/2+10); ctx.textAlign='left';
    ctx.globalAlpha=1;
  }
}

/* ═══════════════════════════════════════════════
   RENDER FRAME
══════════════════════════════════════════════ */
function render(){
  ctx.save();
  ctx.scale(scale,scale);

  drawBg();

  // powerups
  for(const p of powerups){
    const bob=Math.sin(frame*0.08+p.bob)*5;
    // glow
    ctx.fillStyle=p.color+'44';
    ctx.beginPath(); ctx.arc(p.x+22,p.y+22+bob,28,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=p.color+'99';
    rrect(ctx,p.x,p.y+bob,p.w,p.h,12); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    rrect(ctx,p.x,p.y+bob,p.w,p.h,12); ctx.stroke();
    ctx.font='26px serif'; ctx.textAlign='center';
    ctx.fillText(p.icon,p.x+22,p.y+bob+30); ctx.textAlign='left';
  }

  // obstacles
  for(const o of obstacles) o.draw(o);

  // cat
  drawMushu();

  // particles
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // sparkles (star shape)
  for(const s of sparkles){
    ctx.save(); ctx.globalAlpha=Math.max(0,s.alpha);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath();
    for(let k=0;k<4;k++){
      const a=k/4*Math.PI*2;
      ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x+Math.cos(a)*s.r,s.y+Math.sin(a)*s.r);
    }
    ctx.stroke(); ctx.restore();
  }

  // float texts
  for(const f of floats){
    ctx.save(); ctx.globalAlpha=Math.max(0,f.alpha);
    ctx.fillStyle=f.col; ctx.font='bold 18px Baloo\\ 2,sans-serif'; ctx.textAlign='center';
    ctx.fillText(f.txt,f.x+player.w/2,f.y); ctx.restore();
  }
  ctx.textAlign='left';

  drawHUD();
  ctx.restore();
}

/* ═══════════════════════════════════════════════
   SCREEN MANAGER
══════════════════════════════════════════════ */
function showScreen(mode){
  const el=document.getElementById('screen');
  const title=document.getElementById('sTitle');
  const sub=document.getElementById('sSub');
  const btn=document.getElementById('sBtn');
  const hint=document.getElementById('sHint');
  const bestRow=document.getElementById('bestRow');
  el.classList.remove('hidden');
  btns.style.opacity='0.4';
  if(mode==='menu'){
    title.innerHTML='🌈 Mushu<br>Sonrisas en Acción';
    sub.textContent='¡Mushu necesita tu ayuda! El Rey Sarro está ensuciando el Reino de las Sonrisas. ¡Corre, limpia y devuelve la alegría! 🦷✨';
    btn.textContent='¡JUGAR AHORA! 🐱'; btn.className='sbtn green';
    hint.style.display='block'; bestRow.textContent='';
    if(best>0) bestRow.textContent=`🏆 Mejor puntuación: ${Math.floor(best)}`;
  } else {
    title.innerHTML='😿 ¡Ups!';
    sub.textContent='Los gatitos te esperan… ¡Inténtalo de nuevo y sigue limpiando el Reino de las Sonrisas! 🦷';
    btn.textContent='¡OTRA VEZ! 🐱'; btn.className='sbtn';
    hint.style.display='none';
    bestRow.innerHTML=`Tu puntuación: <span style="color:#ffd700;font-weight:900">${Math.floor(score)}</span>&nbsp;&nbsp;🏆 Récord: <span style="color:#ff9de8;font-weight:900">${Math.floor(best)}</span>`;
  }
}

function startGame(){
  document.getElementById('screen').classList.add('hidden');
  btns.style.opacity='1';
  gstate='playing';
  resetGame();
}

document.getElementById('sBtn').addEventListener('click',startGame);
document.getElementById('screen').addEventListener('click',e=>{ if(e.target===e.currentTarget||e.target.id==='screen') startGame(); });

/* ═══════════════════════════════════════════════
   TOUCH CONTROLS
══════════════════════════════════════════════ */
let _lastTap=0, _swY=0, _swTracking=false;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  _swY=t.clientY; _swTracking=true;
  if(gstate!=='playing') return;
  const now=Date.now();
  if(now-_lastTap<260){
    // double tap → force 2nd jump
    if(player.jumps<player.maxJumps){
      player.vy=JUMP2; player.onGround=false; player.jumps++;
      burst(player.x+player.w/2,player.y+player.h,'#ffe066',8);
    }
  } else { doJump(); }
  _lastTap=now;
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!_swTracking||gstate!=='playing') return;
  const dy=e.changedTouches[0].clientY-_swY;
  const dx=Math.abs(e.changedTouches[0].clientX-(e.changedTouches[0].clientX));
  if(dy>30){ doDuck(true); _swTracking=false; }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault(); _swTracking=false;
  if(gstate==='playing') doDuck(false);
},{passive:false});

// Buttons
const btnJump=document.getElementById('btnJump');
const btnDuck=document.getElementById('btnDuck');
const btnPow=document.getElementById('btnPow');

function press(el){ el.style.transform='scale(0.90)'; el.style.filter='brightness(0.8)'; }
function release(el){ el.style.transform=''; el.style.filter=''; }

btnJump.addEventListener('touchstart',e=>{e.preventDefault();press(btnJump);doJump();},{passive:false});
btnJump.addEventListener('touchend',e=>{e.preventDefault();release(btnJump);},{passive:false});
btnJump.addEventListener('mousedown',()=>{press(btnJump);doJump();});
btnJump.addEventListener('mouseup',()=>release(btnJump));

btnDuck.addEventListener('touchstart',e=>{e.preventDefault();press(btnDuck);doDuck(true);},{passive:false});
btnDuck.addEventListener('touchend',e=>{e.preventDefault();release(btnDuck);doDuck(false);},{passive:false});
btnDuck.addEventListener('mousedown',()=>{press(btnDuck);doDuck(true);});
btnDuck.addEventListener('mouseup',()=>{release(btnDuck);doDuck(false);});

btnPow.addEventListener('touchstart',e=>{e.preventDefault();press(btnPow);usePower();},{passive:false});
btnPow.addEventListener('touchend',e=>{e.preventDefault();release(btnPow);},{passive:false});
btnPow.addEventListener('mousedown',()=>{press(btnPow);usePower();});
btnPow.addEventListener('mouseup',()=>release(btnPow));

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp') doJump();
  if(e.code==='ArrowDown') doDuck(true);
  if(e.code==='KeyA'||e.code==='ShiftLeft') usePower();
});
document.addEventListener('keyup',e=>{ if(e.code==='ArrowDown') doDuck(false); });

/* ═══════════════════════════════════════════════
   GAME LOOP
══════════════════════════════════════════════ */
let last=0;
function loop(ts){
  if(ts-last>=14){ last=ts; update(); render(); }
  requestAnimationFrame(loop);
}

showScreen('menu');
requestAnimationFrame(loop);
})();
</script>
